name: Auto Deploy to Droplet

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/video-downloader
            git pull origin main
            npm install
            pm2 restart downloader-bot

      - name: Update Cobalt Cookies
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Cobalt cookies.json faylini yangilash (agar INSTAGRAM_COOKIES secret mavjud bo'lsa)
            if [ -n "${{ secrets.INSTAGRAM_COOKIES }}" ]; then
              echo '${{ secrets.INSTAGRAM_COOKIES }}' > /root/cobalt/cookies.json
              echo "✅ Cobalt cookies.json yangilandi"
              # Cobalt konteynerini qayta ishga tushirish
              cd /root/cobalt && docker compose restart || true
            fi